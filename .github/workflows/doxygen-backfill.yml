name: Backfill Doxygen for existing tags

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo (full history)
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install Doxygen
      run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

    - name: Download doxygen-awesome theme
      run: |
        git clone --depth 1 https://github.com/jothepro/doxygen-awesome-css.git /tmp/doxygen-awesome-css

    - name: Checkout gh-pages
      uses: actions/checkout@v6
      with:
        ref: gh-pages
        path: gh-pages

    - name: Clean up legacy flat layout
      run: |
        cd gh-pages
        find . -maxdepth 1 \
          ! -name '.' ! -name '.git' ! -name '.nojekyll' ! -name 'index.html' \
          ! -name 'master' ! -name 'v*' \
          -exec rm -rf {} +

    - name: Generate docs for each tag
      run: |
        for TAG in $(git tag -l 'v*' | sort -rV); do
          if [ -d "gh-pages/${TAG}" ]; then
            echo "Skipping ${TAG} — already exists"
            continue
          fi
          echo "=== Generating docs for ${TAG} ==="
          git checkout "${TAG}" -- . || continue
          sed -i "s/^PROJECT_NUMBER.*/PROJECT_NUMBER = ${TAG}/" Doxyfile
          sed -i "s|^HTML_EXTRA_STYLESHEET.*|HTML_EXTRA_STYLESHEET = /tmp/doxygen-awesome-css/doxygen-awesome.css|" Doxyfile
          sed -i "s/^HTML_COLORSTYLE.*/HTML_COLORSTYLE = LIGHT/" Doxyfile
          sed -i "s/^GENERATE_TREEVIEW.*/GENERATE_TREEVIEW = YES/" Doxyfile
          sed -i "s/^DISABLE_INDEX.*/DISABLE_INDEX = YES/" Doxyfile
          sed -i "s/^FULL_SIDEBAR.*/FULL_SIDEBAR = YES/" Doxyfile
          doxygen Doxyfile
          cp -r docs/html "gh-pages/${TAG}"
          rm -rf docs/html
          git reset --hard HEAD
        done

    - name: Generate docs for master
      run: |
        git reset --hard HEAD
        sed -i "s/^PROJECT_NUMBER.*/PROJECT_NUMBER = master/" Doxyfile
        sed -i "s|^HTML_EXTRA_STYLESHEET.*|HTML_EXTRA_STYLESHEET = /tmp/doxygen-awesome-css/doxygen-awesome.css|" Doxyfile
        doxygen Doxyfile
        rm -rf gh-pages/master
        cp -r docs/html gh-pages/master

    - name: Generate landing page
      run: |
        cd gh-pages
        bash "$GITHUB_WORKSPACE/.github/generate-docs-index.sh"

    - name: Deploy to Github Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./gh-pages
