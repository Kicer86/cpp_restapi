
name: Build-Linux-Qt6

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        compiler:
          - { cc: gcc, cxx: g++ }
          - { cc: clang, cxx: clang++ }

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: false

    - name: Install system dependencies
      run: |
        sudo apt-get update &&  \
        sudo apt-get install    \
          ninja-build           \
          libgmock-dev          \
          qt6-base-dev          \
          libcurl4-openssl-dev  \
          libcpp-httplib-dev    \
          libjsoncpp-dev

    - name: Build (${{ matrix.compiler.cc }})
      uses: ashutoshvarma/action-cmake-build@master
      with:
        build-dir: ${{ runner.workspace }}/build
        build-type: Release
        cc: ${{ matrix.compiler.cc }}
        cxx: ${{ matrix.compiler.cxx }}
        configure-options: -DCppRestAPI_Tests=ON -DCppRestAPI_UseQt6=ON -DCppRestAPI_Examples=ON

    - name: Run tests
      run: ctest --test-dir ${{ runner.workspace }}/build --output-on-failure
