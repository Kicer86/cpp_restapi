
name: Generate Doxygen

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v6

    - name: Determine version slug
      id: version
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          echo "slug=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
        else
          echo "slug=master" >> "$GITHUB_OUTPUT"
        fi

    - name: Set version in Doxyfile
      run: |
        sed -i "s/^PROJECT_NUMBER.*/PROJECT_NUMBER = ${{ steps.version.outputs.slug }}/" Doxyfile

    - name: Generate Docs
      uses: mattnotmitt/doxygen-action@v1.12.0

    - name: Checkout gh-pages
      uses: actions/checkout@v6
      with:
        ref: gh-pages
        path: gh-pages

    - name: Clean up legacy flat layout
      run: |
        cd gh-pages
        # Remove everything except version directories, .nojekyll, index.html, and .git
        find . -maxdepth 1 \
          ! -name '.' ! -name '.git' ! -name '.nojekyll' ! -name 'index.html' \
          ! -name 'master' ! -name 'v*' \
          -exec rm -rf {} +

    - name: Update versioned docs
      run: |
        SLUG="${{ steps.version.outputs.slug }}"
        rm -rf "gh-pages/${SLUG}"
        cp -r docs/html "gh-pages/${SLUG}"

    - name: Generate landing page
      run: |
        cd gh-pages
        # collect all version directories (vX.Y.Z), sort descending
        VERSIONS=$(find . -maxdepth 1 -type d -name 'v*' | sed 's|./||' | sort -rV)

        cat > index.html << 'HEADER'
        <!DOCTYPE html>
        <html lang="en">
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>cpp Rest API – Documentation</title>
          <style>
            body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif; max-width: 700px; margin: 60px auto; padding: 0 20px; color: #333; }
            h1 { border-bottom: 2px solid #eee; padding-bottom: 12px; }
            ul { list-style: none; padding: 0; }
            li { margin: 8px 0; }
            a { color: #0366d6; text-decoration: none; font-size: 1.1em; }
            a:hover { text-decoration: underline; }
            .latest-tag { font-size: 0.8em; color: #6a737d; margin-left: 6px; }
          </style>
        </head>
        <body>
          <h1>cpp Rest API – Documentation</h1>
          <ul>
            <li><a href="master/">master</a> <span class="latest-tag">(development)</span></li>
        HEADER

        FIRST=true
        for V in $VERSIONS; do
          TAG=""
          if $FIRST; then TAG=' <span class="latest-tag">(latest release)</span>'; FIRST=false; fi
          echo "    <li><a href=\"${V}/\">${V}</a>${TAG}</li>" >> index.html
        done

        cat >> index.html << 'FOOTER'
          </ul>
        </body>
        </html>
        FOOTER

    - name: Deploy to Github Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./gh-pages
