
name: Generate Doxygen

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v6

    - name: Determine version slug
      id: version
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          echo "slug=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
        else
          echo "slug=master" >> "$GITHUB_OUTPUT"
        fi

    - name: Set version in Doxyfile
      run: |
        sed -i "s/^PROJECT_NUMBER.*/PROJECT_NUMBER = ${{ steps.version.outputs.slug }}/" Doxyfile

    - name: Download doxygen-awesome theme
      run: |
        git clone --depth 1 https://github.com/jothepro/doxygen-awesome-css.git

    - name: Generate Docs
      uses: mattnotmitt/doxygen-action@v1.12.0

    - name: Checkout gh-pages
      uses: actions/checkout@v6
      with:
        ref: gh-pages
        path: gh-pages

    - name: Clean up legacy flat layout
      run: |
        cd gh-pages
        # Remove everything except version directories, .nojekyll, index.html, and .git
        find . -maxdepth 1 \
          ! -name '.' ! -name '.git' ! -name '.nojekyll' ! -name 'index.html' \
          ! -name 'master' ! -name 'v*' \
          -exec rm -rf {} +

    - name: Update versioned docs
      run: |
        SLUG="${{ steps.version.outputs.slug }}"
        rm -rf "gh-pages/${SLUG}"
        cp -r docs/html "gh-pages/${SLUG}"

    - name: Generate landing page
      run: |
        cd gh-pages
        bash "$GITHUB_WORKSPACE/.github/generate-docs-index.sh"

    - name: Deploy to Github Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./gh-pages
