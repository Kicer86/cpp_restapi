
name: Build-Linux-Qt5

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        compiler:
          - { cc: gcc, cxx: g++ }
          - { cc: clang, cxx: clang++ }

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: false

    - name: Install system dependencies
      run: |
        sudo apt-get update &&  \
        sudo apt-get install    \
          ninja-build           \
          libgmock-dev          \
          qtbase5-dev           \
          libcurl4-openssl-dev  \
          libjsoncpp-dev

    - name: Install cpp-httplib from source
      run: |
        git clone --depth 1 https://github.com/yhirose/cpp-httplib.git /tmp/cpp-httplib
        cmake -B /tmp/cpp-httplib/build -S /tmp/cpp-httplib -DHTTPLIB_USE_ZSTD_IF_AVAILABLE=OFF
        sudo cmake --install /tmp/cpp-httplib/build

    - name: Build
      uses: ashutoshvarma/action-cmake-build@master
      with:
        build-dir: ${{ runner.workspace }}/build
        build-type: Release
        configure-options: -DCppRestAPI_Tests=ON -DCppRestAPI_UseQt6=OFF -DCppRestAPI_Examples=ON -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }} -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }}
        run-test: true

